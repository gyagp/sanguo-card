project:
  name: sanguo-card
  description: 三国卡牌游戏 — A Three Kingdoms card game inspired by Hearthstone, with
    characters from Romance of the Three Kingdoms. Beautifully designed,
    gorgeous effects, vivid BGM, cartoon style, moderately difficult, addictive
    gameplay.
  path: D:/workspace/project/gyagp/sanguo-card
goals:
  - id: scaffold
    description: Next.js project with TypeScript, Tailwind CSS, ready for Vercel deployment
    acceptance:
      - Next.js app created with TypeScript and Tailwind CSS
      - npm run build succeeds
      - npm run dev starts the dev server
    priority: 1
  - id: core-engine
    description: Core card game engine with Three Kingdoms characters and
      Hearthstone-like mechanics
    acceptance:
      - "Card data model with: name, cost, attack, health, description, rarity,
        type (minion/spell/weapon)"
      - Deck building system with 30-card decks
      - "Turn-based game loop: draw card, gain mana crystal, play cards, attack,
        end turn"
      - Mana system starting at 1, increasing by 1 each turn up to 10
      - Minion placement on board (max 7 per side)
      - "Combat system: minions attack other minions or hero"
      - Hero health (30 HP) and hero power
      - Card draw from deck, hand limit of 10
      - "Win condition: reduce opponent hero health to 0"
      - At least 30 unique Three Kingdoms character cards with abilities
    priority: 2
  - id: card-design
    description: Beautiful cartoon-style card designs with Three Kingdoms characters
    acceptance:
      - Card component with cartoon-style visual design
      - Card frame with rarity colors (common/rare/epic/legendary)
      - Mana cost crystal in top-left corner
      - Attack and health values at bottom corners
      - Card name and description text
      - Card hover animation (enlarge and glow)
      - Different visual treatment for minion, spell, and weapon cards
      - At least 5 faction colors representing Wei, Shu, Wu, Qun, and neutral
    priority: 3
  - id: game-board
    description: Interactive game board with drag-and-drop card play and attack animations
    acceptance:
      - "Split-screen board: player side at bottom, opponent at top"
      - Hand display at bottom showing current cards
      - Board with minion slots for both players
      - Drag-and-drop to play cards from hand to board
      - "Click-to-attack: select attacker, click target"
      - Mana bar display showing available/total mana
      - End Turn button with visual feedback
      - Hero portraits with health display
      - Hero power button
      - Turn indicator and timer visual
    priority: 4
  - id: visual-effects
    description: Gorgeous visual effects, animations, and particle systems
    acceptance:
      - Card play animation (card flies from hand to board)
      - Attack animation with impact effect
      - Spell casting visual effects with particles
      - Card destruction animation (shatter effect)
      - Damage numbers floating up on hit
      - Legendary card entrance animation (golden glow)
      - Turn start/end transition effects
      - Victory/defeat screen with dramatic animation
      - Smooth CSS transitions throughout
    priority: 5
  - id: ai-opponent
    description: AI opponent for single-player mode with reasonable difficulty
    acceptance:
      - AI can play cards following mana cost rules
      - AI prioritizes trading minions efficiently
      - AI uses hero power when appropriate
      - AI targets face (hero) when lethal is available
      - AI plays on-curve (uses most mana each turn)
      - "Three difficulty levels: Easy, Normal, Hard"
      - AI responds within 2 seconds per turn
    priority: 6
  - id: audio
    description: Vivid BGM and sound effects using Web Audio API
    acceptance:
      - Epic background music (procedurally generated or royalty-free
        Chinese-themed)
      - Card play sound effect
      - Attack and damage sound effects
      - Hero power activation sound
      - Turn start chime
      - Victory fanfare and defeat sound
      - Card draw sound
      - Volume control and mute toggle
      - Audio lazy-loaded, does not block page load
    priority: 7
  - id: polish
    description: "Production-ready polish: responsive, accessible, performant"
    acceptance:
      - All game features work without console errors
      - npm run build produces no errors
      - Responsive design works on desktop and tablet
      - Main menu with Play, Deck Builder, and Settings
      - Deck builder UI to create and save custom decks (localStorage)
      - Game state persistence (can resume interrupted game)
      - SEO meta tags and favicon
      - README with game description and instructions
      - 60fps gameplay with no jank
      - Beautiful loading screen
    priority: 8
  - id: chinese-localization
    description: 全中文化 — 所有界面文本、卡牌名称和描述均使用中文
    acceptance:
      - 所有卡牌名称和描述使用中文（三国人名、技能描述）
      - 所有UI文本使用中文（菜单、按钮、提示）
      - 卡牌图鉴页筛选器使用中文标签
      - 设置页使用中文
      - 胜负画面使用中文
    priority: 9
    depends_on: [polish]
  - id: card-art
    description: 精美卡通风格人物卡牌插画 — 使用Gemini API生成每张卡牌的独特插画图片
    acceptance:
      - "使用Gemini API (gemini-2.5-flash-image模型) 为每张卡牌生成独特的卡通风格插画PNG图片"
      - 随从卡显示角色形象（三国武将造型，卡通风格）
      - 法术卡显示法术效果场景
      - 武器卡显示武器造型
      - 生成的图片保存到 public/card-art/ 目录，以卡牌ID命名
      - 卡牌组件从 /card-art/[id].png 加载插画图片
      - 卡牌插画区域占卡牌面积的40%以上
      - 不同势力（魏蜀吴群）有不同的配色风格
      - "Gemini API调用方式: POST https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=$GEMINI_API_KEY，使用responseModalities: ['TEXT', 'IMAGE']"
    priority: 10
    depends_on: [chinese-localization]

  - id: ability-engine
    description: 卡牌效果引擎 — 实现关键词和法术效果系统，让卡牌能力真正生效
    acceptance:
      - "关键词系统实现：嘲讽(taunt阻挡攻击)、冲锋(charge立即攻击)、圣盾(divine shield吸收一次伤害)、亡语(deathrattle死亡触发)、战吼(battlecry入场触发)"
      - "法术效果实现：造成伤害、恢复生命、抽牌、增益随从、AOE群伤、变形、召唤随从"
      - "武器攻击：装备武器后英雄可以攻击随从或对方英雄，每次攻击消耗耐久"
      - "事件/触发系统：支持亡语、战吼、回合结束效果的触发和结算"
      - "法术伤害加成：场上有法术伤害随从时法术伤害增加"
      - "更多关键词：潜行(stealth)、风怒(windfury可攻击两次)、激怒(enrage受伤后增强)、冻结(freeze跳过攻击)"
      - 所有34张现有卡牌的描述效果均已实现并可正常生效
      - npm run build无错误
    priority: 11
    depends_on: [card-art]

  - id: faction-synergy
    description: 阵营势力系统 — 魏蜀吴群各有独特机制和连携效果
    acceptance:
      - "魏(Wei)控制型：额外抽牌、法术费用减少、冻结效果加强"
      - "蜀(Shu)团结型：友方随从在场时互相增益，兄弟连携加成"
      - "吴(Wu)速攻型：冲锋随从多、武器连携、连击链"
      - "群(Qun)混乱型：随机效果、高风险高回报、敌方减益"
      - "阵营加成：卡组中20+同阵营卡牌激活被动英雄技能升级"
      - "混合卡组无阵营加成但更灵活"
      - UI显示当前阵营加成状态
    priority: 12
    depends_on: [ability-engine]

  - id: collection-upgrade
    description: 卡牌收集与升级系统 — 持久化进度和成长系统
    acceptance:
      - "玩家初始拥有基础普通卡牌，通过游戏获得新卡"
      - "金币系统：胜利获得金币，用于购买卡包"
      - "卡包系统：每包5张卡，保底1张稀有以上"
      - "卡牌升级：消耗金币+重复卡牌升级属性（每级+1攻击或+1生命，最高3级）"
      - "玩家等级：游戏获得经验值，升级解锁新功能"
      - "收藏页面显示已拥有和未解锁卡牌及进度"
      - 所有数据使用localStorage持久化保存
      - 刷新页面后进度不丢失
    priority: 13
    depends_on: [faction-synergy]

  - id: pve-adventure
    description: PVE冒险模式 — 三国故事战役，5章30关
    acceptance:
      - "5个章节：黄巾之乱(教程)、群雄逐鹿(阵营)、三足鼎立(挑战)、赤壁之战(策略谜题)、天下归一(终极Boss)"
      - "每章5个普通关卡+1个Boss战=30关"
      - "每关有预设敌方卡组，难度递增"
      - "Boss战有特殊规则（额外法力、独特英雄技能、场地效果）"
      - "通关奖励：金币、卡包、特定卡牌"
      - "星级评分（1-3星）基于剩余血量和回合数"
      - 冒险模式进度保存在localStorage
      - 有冒险地图/关卡选择界面
    priority: 14
    depends_on: [collection-upgrade]

  - id: tactical-board
    description: 战棋策略元素 — 分路系统和阵型加成
    acceptance:
      - "战场分为3条路线（左/中/右），每路2个位置=每方6个格子"
      - "随从只能攻击同路或相邻路的随从"
      - "地形效果：部分PVE关卡有路线修改器（火焰伤害、治疗光环、隐身区域）"
      - "阵型加成：相邻同阵营随从获得+1/+1"
      - "路线法术：AOE只影响一条路线"
      - UI清晰显示路线划分和地形效果
    priority: 15
    depends_on: [pve-adventure]

  - id: expanded-cards
    description: 扩展卡池 — 从34张扩展到100+张卡牌
    acceptance:
      - "每个阵营至少20张卡牌（魏蜀吴群）+20张中立=100+张"
      - "新卡牌类型：陷阱(trap)卡，在对手回合触发"
      - "传说英雄拥有阵营专属英雄技能"
      - "衍生随从（由其他卡牌召唤，不可收集）"
      - "使用Gemini API（从环境变量GEMINI_API_KEY读取密钥）为新卡生成卡面插画"
      - "绝不在代码中硬编码API密钥"
      - npm run build无错误
    priority: 16
    depends_on: [tactical-board]

  - id: enhanced-ai
    description: 增强AI — 理解新系统的智能对手
    acceptance:
      - "AI理解关键词交互（优先移除嘲讽、避免浪费攻击在圣盾上）"
      - "AI利用阵营连携构建和出牌"
      - "AI根据场面判断打法（进攻vs控制）"
      - "Boss AI有脚本化阶段和特殊行为"
      - "难度影响AI卡组质量而非仅出牌技巧"
      - 困难模式下AI有明显挑战性
    priority: 17
    depends_on: [expanded-cards]

settings:
  max_iterations: 300
  max_time_hours: 96
  tech_stack: Next.js, TypeScript, Tailwind CSS, HTML5 Canvas, Web Audio API
  auto_push: true
  ui_port: 4800
  env:
    GEMINI_API_KEY: AIzaSyDvcfsyYp36o-U9XcTURF3wfWkedroXa1M
